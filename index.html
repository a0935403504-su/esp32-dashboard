<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ESP32 Cloud Dashboard</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  margin: 0;
  padding: 12px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.status {
  text-align: center;
  margin-bottom: 20px;
  color: #aaa;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px;
}

.card {
  background: #222;
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

.online {
  color: #00ff66;
  font-weight: bold;
  font-size: 22px;
}

.busy {
  color: #ffcc00;
  font-weight: bold;
  font-size: 22px;
}

.offline {
  color: #ff4444;
  font-weight: bold;
  font-size: 22px;
}

.value {
  font-size: 20px;
  margin-top: 6px;
}

.raw {
  color: #999;
  font-size: 13px;
  margin-top: 10px;
}

.time {
  color: #aaa;
  font-size: 13px;
  margin-top: 10px;
}
</style>
</head>

<body>
<button onclick="downloadCSV()" style="
width:100%;
height:55px;
font-size:22px;
background:#007bff;
color:white;
border:none;
border-radius:10px;
margin-bottom:15px;
">
下載 CSV
</button>  

<h1>ESP32 雲端 Dashboard</h1>

<div class="status" id="status">
讀取中...
</div>

<div class="grid" id="nodes"></div>

<script>

const DATA_URL = "https://su-esp32-master-default-rtdb.firebaseio.com/masters/master01/nodes.json";

async function loadData() {
  const status = document.getElementById("status");
  const box = document.getElementById("nodes");

  status.innerHTML = "正在讀取 Firebase...";

  try {
    const res = await fetch(DATA_URL);

    if (!res.ok) {
      status.innerHTML = "HTTP錯誤：" + res.status + " " + res.statusText;
      return;
    }

    const data = await res.json();

    box.innerHTML = "";
    status.innerHTML = "讀取成功：" + new Date().toLocaleTimeString();

    if (!data) {
      status.innerHTML = "Firebase 沒有資料";
      return;
    }

    for (let i = 1; i <= 10; i++) {
      const node = data["node" + i];

      let html = "<div class='card'>";
      html += "<h2>NODE " + i + "</h2>";

      if (!node) {
        html += "<div class='offline'>OFFLINE</div>";
      } else if (node.status == 1) {
        html += "<div class='busy'>BUSY</div>";
      } else {
        html += "<div class='online'>ONLINE</div>";
        html += "<div class='value'>A: " + (node.A_diff ?? node.A ?? 0) + "</div>";
        html += "<div class='value'>B: " + (node.B_diff ?? node.B ?? 0) + "</div>";
        html += "<div class='value'>H: " + (node.H_diff ?? node.H ?? 0) + "</div>";
        html += "<div class='time'>" + (node.time ?? "") + "</div>";
      }

      html += "</div>";
      box.innerHTML += html;
    }

  } catch (e) {
    status.innerHTML = "讀取失敗：" + e;
  }
}

loadData();
setInterval(loadData, 2000);

async function downloadCSV() {

  const res = await fetch(DATA_URL);
  const data = await res.json();

  let csv =
    "node,id,status,A,B,H,seq,time\n";

  for (let i = 1; i <= 10; i++) {

    const node =
      data ? data["node" + i] : null;

    if (node) {

      csv += "node" + i + ",";
      csv += (node.id ?? i) + ",";
      csv += (node.status ?? "") + ",";
      csv += (node.A_diff ?? node.A ?? 0) + ",";
      csv += (node.B_diff ?? node.B ?? 0) + ",";
      csv += (node.H_diff ?? node.H ?? 0) + ",";
      csv += (node.seq ?? "") + ",";
      csv += "\"" + (node.time ?? "") + "\"";
      csv += "\n";
    }
  }

  const blob = new Blob(
    [csv],
    { type: "text/csv;charset=utf-8;" }
  );

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");

  a.href = url;
  a.download = "firebase_nodes.csv";

  a.click();

  URL.revokeObjectURL(url);
}

</script>

</body>
</html>
