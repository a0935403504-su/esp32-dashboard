<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ESP32 Cloud Dashboard</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  margin: 0;
  padding: 12px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.status {
  text-align: center;
  margin-bottom: 20px;
  color: #aaa;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px;
}

.card {
  background: #222;
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

.online {
  color: #00ff66;
  font-weight: bold;
  font-size: 22px;
}

.busy {
  color: #ffcc00;
  font-weight: bold;
  font-size: 22px;
}

.offline {
  color: #ff4444;
  font-weight: bold;
  font-size: 22px;
}

.value {
  font-size: 20px;
  margin-top: 6px;
}

.raw {
  color: #999;
  font-size: 13px;
  margin-top: 10px;
}

.time {
  color: #aaa;
  font-size: 13px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>ESP32 雲端 Dashboard</h1>

<div class="status" id="status">
讀取中...
</div>

<div class="grid" id="nodes"></div>

<script>

const DATA_URL = "https://su-esp32-master-default-rtdb.firebaseio.com/nodes.json";

async function loadData() {

  try {

    const res = await fetch(DATA_URL);

    const data = await res.json();

    const box = document.getElementById("nodes");
    const status = document.getElementById("status");

    box.innerHTML = "";

    status.innerHTML =
      "最後更新：" + new Date().toLocaleString();

    for (let i = 1; i <= 10; i++) {

      const node = data ? data["node" + i] : null;

      let html = "";

      html += "<div class='card'>";

      html += "<h2>NODE " + i + "</h2>";

      if (!node) {

        html += "<div class='offline'>OFFLINE</div>";

      }
      else if (node.status == 1) {

        html += "<div class='busy'>BUSY</div>";

        html += "<div class='time'>";
        html += node.time || "";
        html += "</div>";

      }
      else {

        html += "<div class='online'>ONLINE</div>";

        html += "<div class='value'>A: ";
        html += node.A;
        html += "</div>";

        html += "<div class='value'>B: ";
        html += node.B;
        html += "</div>";

        html += "<div class='value'>H: ";
        html += node.H;
        html += "</div>";

        html += "<div class='raw'>SEQ: ";
        html += node.seq;
        html += "</div>";

        html += "<div class='time'>";
        html += node.time || "";
        html += "</div>";
      }

      html += "</div>";

      box.innerHTML += html;
    }

  }
  catch (e) {

    console.log(e);

    document.getElementById("status").innerHTML =
      "讀取失敗：" + e;
  }
}

loadData();

setInterval(loadData, 2000);

</script>

</body>
</html>
